<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Construction</title>
    <style>
        body {
            background-color: #EDF3DB; /* Beige background */
            color: #506468; /* Dark text color */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #B8D8D8; /* Light blue container */
            padding: 40px;
            border-radius: 50%; /* Circular shape */
            width: 600px; /* Increased size */
            height: 600px; /* Increased size */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #EC6059; /* Red heading */
        }
        p {
            font-size: 1.2em;
            margin: 0;
        }
        .logo {
            margin-bottom: 20px;
        }
        .logo img {
            max-width: 200px; /* Larger company logo */
            height: auto;
        }
        .construction-logo {
            width: 150px; /* Large construction logo */
            height: 150px; /* Large construction logo */
            background-color: #7B9FA0; /* Placeholder color */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em; /* Larger emoji */
            color: #EDF3DB; /* Beige text */
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <!-- Replace 'logo.png' with your actual logo file name -->
            <img src="logo.png" alt="Company Logo">
        </div>
        <div class="construction-logo">
            🚧 <!-- Placeholder for construction logo -->
        </div>
        <h1>Website Under Construction</h1>
        <p>الموقع قيد الإنشاء</p>
    </div>
</body>
</html>
